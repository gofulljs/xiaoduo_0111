<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客服工单趋势分析</title>
  <style>
    :root { --ink:#071a2c; --panel:#0c2942; --line:#1b4564; --text:#e8f3f8; --muted:#94b5c8; --cyan:#37e0d0; --orange:#ff9f43; --red:#ff6f61; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--ink); color:var(--text); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { max-width:1320px; margin:0 auto; padding:42px 28px 28px; }
    h1,h2,h3,p { margin-top:0; }
    h1 { margin-bottom:6px; font-size:clamp(30px,5vw,52px); line-height:1.15; letter-spacing:-.04em; }
    h2 { margin-bottom:16px; font-size:19px; }
    .eyebrow { color:var(--cyan); font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }
    .lede,.note,#load-status { color:var(--muted); }
    .header { display:flex; justify-content:space-between; gap:24px; align-items:end; border-bottom:1px solid var(--line); padding-bottom:28px; }
    .controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    button { border:1px solid var(--cyan); border-radius:999px; background:transparent; color:var(--cyan); cursor:pointer; padding:8px 14px; font:inherit; }
    button:hover,button:focus-visible { background:var(--cyan); color:var(--ink); }
    #load-status { flex-basis:100%; min-height:24px; font-size:13px; }
    .metrics { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin:26px 0; }
    .metric,.panel,.alert { background:var(--panel); border:1px solid var(--line); border-radius:12px; }
    .metric { min-height:142px; padding:18px; display:flex; flex-direction:column; justify-content:space-between; }
    .metric strong,.channel-stats strong { color:var(--cyan); font-size:27px; line-height:1.1; }
    .metric span,.channel-stats span { color:var(--muted); font-size:13px; }
    .risk strong,.alert h3 { color:var(--orange); }
    .grid { display:grid; grid-template-columns:1.4fr .9fr; gap:18px; margin-bottom:18px; }
    .panel { padding:22px; }
    .chart { display:block; width:100%; height:auto; overflow:visible; }
    .chart text { fill:var(--muted); font-size:10px; }
    .axis { stroke:var(--line); stroke-width:1; }
    .trend { fill:none; stroke:var(--cyan); stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
    .dot { fill:var(--cyan); }
    .insight { margin:16px 0 0; padding-left:14px; border-left:3px solid var(--cyan); color:var(--muted); }
    .channel-stats { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:16px; }
    .channel-stats div { border-top:1px solid var(--line); padding-top:10px; }
    .distribution-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; margin-bottom:18px; }
    .distribution-content { display:flex; gap:20px; align-items:center; }
    .donut { width:132px; flex:none; transform:rotate(-90deg); }
    .donut circle { fill:none; stroke-width:16; }
    .track { stroke:var(--line); }
    .legend { flex:1; margin:0; padding:0; list-style:none; color:var(--muted); font-size:13px; }
    .legend li { padding:2px 0; }
    .legend-swatch { display:inline-block; width:10px; height:10px; margin-right:7px; border-radius:50%; }
    .conclusion { margin:18px 0 0; padding:10px 12px; border-left:3px solid var(--orange); background:rgba(255,159,67,.08); color:var(--text); font-size:14px; }
    .table-wrap { overflow-x:auto; }
    table { width:100%; min-width:760px; border-collapse:collapse; font-size:14px; }
    th,td { padding:12px 14px; border-bottom:1px solid var(--line); text-align:right; white-space:nowrap; }
    th { color:var(--muted); font-size:12px; font-weight:600; }
    th:first-child,td:first-child { text-align:left; }
    td:first-child { color:var(--text); font-weight:700; }
    .alerts { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
    .alert { padding:20px; border-top:3px solid var(--orange); }
    .alert p { color:var(--muted); }
    footer { margin-top:28px; padding:22px 0 0; border-top:1px solid var(--line); color:var(--muted); font-size:13px; }
    @media (max-width:900px) { .grid,.alerts { grid-template-columns:1fr; } .metrics { grid-template-columns:repeat(3,1fr); } }
    @media (max-width:720px) { main { padding:28px 16px; } .header { align-items:start; flex-direction:column; } .metrics { grid-template-columns:1fr; } .distribution-grid { grid-template-columns:1fr; } }
    @media (max-width:480px) { .distribution-content { flex-direction:column; } .donut { margin:0 auto; } }
  </style>
  <script src="./app.js" defer></script>
</head>
<body>
  <main>
    <header class="header">
      <div>
        <div class="eyebrow">Customer Support Intelligence</div>
        <h1>客服工单趋势分析</h1>
        <p class="lede">在浏览器中加载内置示例或本地 JSON，生成可复核的服务风险报告。</p>
      </div>
      <div class="controls" aria-label="数据加载方式">
        <button id="load-example" type="button">加载内置示例</button>
        <button id="load-file" type="button">选择本地 JSON</button>
        <input id="ticket-file" type="file" accept="application/json,.json" hidden>
        <div id="load-status" role="status" aria-live="polite">正在加载内置示例…</div>
      </div>
    </header>
    <div id="report" aria-live="polite"></div>
  </main>
</body>
</html>
